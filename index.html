<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Valorant Map Agents</title>
<link rel="stylesheet" href="valorant.css">

<style>
    body {
        background-color: #0f1923;
        padding: 20px;
        margin: 0;
    }

    h1 {
        color: white;
        font-family: Impact, sans-serif;
        letter-spacing: 2px;
        border-bottom: 2px solid #ff4655;
        padding-bottom: 10px;
    }
</style>

</head>

<body>

  <div id="header">
    <h1>Best Agents for Every Map:</h1>
    <div id="filterButtons">
      <button onclick="filterAgents('all')">All</button>
      <button onclick="filterAgents('duelist')" class="roleButton">
        <img src="images/ButtonIcons/duelist.png" class="roleIcon">
      </button>
      <button onclick="filterAgents('initiator')">Initiator</button>
      <button onclick="filterAgents('controller')">Controller</button>
      <button onclick="filterAgents('sentinel')">Sentinel</button>
    </div>
  </div>

  <div id="mapContainer"></div>

  <script src="valorant.js"></script>
  
</body>
</html>
